name: Build a nahranie na FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Stiahni repo
        uses: actions/checkout@v4

      - name: Nastav Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Nainštaluj závislosti
        run: npm ci

      - name: Zbuilduj web
        env:
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          GITHUB_BRANCH: ${{ github.ref_name }}
        run: |
          if [ -n "${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}" ]; then
            echo "TinaCloud nastavený -> build vrátane /admin"
            npm run tina:build
          else
            echo "TinaCloud zatiaľ nenastavený -> build len webu"
            npm run build
          fi

      - name: Nahraj na server (SFTP)
        env:
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_DIR: ${{ vars.FTP_SERVER_DIR || './' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "set sftp:auto-confirm yes; \
            open -u '$SFTP_USER','$SFTP_PASS' sftp://$SFTP_SERVER:22; \
            mirror -R --verbose --parallel=2 ./_site/ '$SFTP_DIR'"
